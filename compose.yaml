name: video-together
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: video_together
      POSTGRES_USER: video_together
      POSTGRES_PASSWORD: video_together
    ports: ["5432:5432"]
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U video_together"]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    volumes: [redis-data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://video_together:video_together@postgres:5432/video_together?schema=public
      REDIS_URL: redis://redis:6379
      WEB_ORIGIN: http://localhost:3000
    ports: ["4000:4000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
        NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    ports: ["3000:3000"]
    depends_on: [api]
volumes:
  postgres-data:
  redis-data:
